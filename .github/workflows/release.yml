name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Build app bundle
        run: make app

      - name: Create DMG
        run: make dmg

      - name: Compute SHA256
        id: sha
        run: echo "sha256=$(shasum -a 256 build/SystemPulse.dmg | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/SystemPulse.dmg
          body: |
            ## SystemPulse ${{ github.ref_name }}

            **SHA256:** `${{ steps.sha.outputs.sha256 }}`

            ### Install
            Download `SystemPulse.dmg` and drag to Applications.
